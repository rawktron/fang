name: CLI Release

on:
  release:
    types: [published, prereleased]
  workflow_dispatch:
    inputs:
      tag:
        description: CLI release tag, for example v0.1.0
        required: true

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.event.release.tag_name || inputs.tag, 'v')
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x86_64
            runner: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            triple: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Download fang-runtime
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          PYTHON_SERIES=$(python3 - <<'PY'
          import re
          from pathlib import Path

          text = Path("fang.toml").read_text()
          match = re.search(r'^\s*python\s*=\s*"([0-9]+)\.([0-9]+)', text, re.M)
          if not match:
              raise SystemExit("could not find [project] python in fang.toml")
          print(f"{match.group(1)}.{match.group(2)}")
          PY
          )
          TAG="fang-runtime-${RELEASE_TAG}"
          ASSET="fang-runtime-${PYTHON_SERIES}-${{ matrix.platform.triple }}"
          echo "Using runtime release: ${TAG}"
          echo "Waiting for runtime asset: ${ASSET}"
          for attempt in {1..60}; do
            if gh release view "$TAG" --repo ${{ github.repository }} \
              --json assets --jq '.assets[].name' 2>/dev/null | grep -qx "$ASSET"; then
              break
            fi
            if [[ "$attempt" == 60 ]]; then
              echo "ERROR: runtime asset ${ASSET} was not found on ${TAG} after 30 minutes" >&2
              exit 1
            fi
            echo "Runtime asset is not available yet (${attempt}/60); sleeping 30s"
            sleep 30
          done
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern "$ASSET" \
            --dir runtime-dist
          chmod +x "runtime-dist/$ASSET"
          echo "FANG_RUNTIME_PATH=runtime-dist/$ASSET" >> "$GITHUB_ENV"

      - name: Build CLI
        run: ./build_cli.sh

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            dist/fang-${{ matrix.platform.name }}
            dist/fang-${{ matrix.platform.name }}.sha256
